<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>keen-pbr Wireframe - DNS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1>keen-pbr</h1>
        <nav>
          <a href="./overview.html">Overview</a>
          <a href="./configuration.html">Configuration</a>
          <a href="./config-general.html">General config</a>
          <a href="./config-lists.html">Lists</a>
          <a href="./config-outbounds.html">Outbounds</a>
          <a href="./config-dns.html">DNS</a>
          <a href="./config-routing-rules.html">Routing rules</a>
          <a href="./index.html">Wireframe index</a>
        </nav>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <h2>DNS</h2>
            <p class="muted">DNS servers, list-to-server rules, and fallback selection.</p>
          </div>
          <div class="topbar-actions">
            <a href="./configuration.html">Back to config hub</a>
            <button>Save and reload</button>
          </div>
        </div>

        <section class="panel">
          <h3>Servers</h3>
          <table>
            <thead>
              <tr>
                <th>Tag</th>
                <th>Address</th>
                <th>Detour</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><input type="text" value="vpn-dns" /></td>
                <td><input type="text" value="10.8.0.1" /></td>
                <td>
                  <select>
                    <option selected>vpn</option>
                    <option>wan</option>
                    <option>auto-select</option>
                  </select>
                </td>
                <td><button>Delete</button></td>
              </tr>
              <tr>
                <td><input type="text" value="google-dns" /></td>
                <td><input type="text" value="8.8.8.8" /></td>
                <td>
                  <select>
                    <option selected>None</option>
                    <option>vpn</option>
                    <option>wan</option>
                    <option>auto-select</option>
                  </select>
                </td>
                <td><button>Delete</button></td>
              </tr>
            </tbody>
          </table>
          <div class="button-row">
            <button>Add DNS server</button>
          </div>
        </section>

        <section class="panel">
          <h3>Rules</h3>
          <table>
            <thead>
              <tr>
                <th>List</th>
                <th>Server tag</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>
                  <select>
                    <option selected>my-domains</option>
                    <option>remote-list</option>
                    <option>my-ips</option>
                  </select>
                </td>
                <td>
                  <select>
                    <option selected>vpn-dns</option>
                    <option>google-dns</option>
                  </select>
                </td>
                <td><button>Delete</button></td>
              </tr>
              <tr>
                <td>
                  <select>
                    <option>my-domains</option>
                    <option selected>remote-list</option>
                    <option>my-ips</option>
                  </select>
                </td>
                <td>
                  <select>
                    <option selected>vpn-dns</option>
                    <option>google-dns</option>
                  </select>
                </td>
                <td><button>Delete</button></td>
              </tr>
            </tbody>
          </table>
          <div class="button-row">
            <button>Add DNS rule</button>
          </div>
        </section>

        <section class="panel">
          <h3>Fallback</h3>
          <div class="form-grid">
            <div class="field">
              <label>Fallback server tag</label>
              <select>
                <option>vpn-dns</option>
                <option selected>google-dns</option>
              </select>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
