[binaries]
c = 'aarch64-openwrt-linux-musl-gcc'
cpp = 'aarch64-openwrt-linux-musl-g++'
ar = 'aarch64-openwrt-linux-musl-ar'
strip = 'aarch64-openwrt-linux-musl-strip'
pkg-config = 'aarch64-openwrt-linux-musl-pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'cortex-a53'
endian = 'little'
