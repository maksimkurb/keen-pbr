name: Build Keenetic packages

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  prepare-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build frontend
        run: bun run build
      - name: Keep only .gz frontend assets
        run: |
          mkdir -p "$GITHUB_WORKSPACE/frontend-dist-gz"
          cd dist
          find . -type f -name '*.gz' -exec cp --parents {} "$GITHUB_WORKSPACE/frontend-dist-gz" \;
      - name: Upload frontend bundle
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist-gz
          path: frontend-dist-gz

  build:
    name: "mipsel-3.4"
    runs-on: ubuntu-latest
    needs: prepare-frontend
    container:
      image: ghcr.io/maksimkurb/entware-builder:mipsel-3.4
      options: --user root
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-gz
          path: frontend-dist-gz
      - name: Stage frontend dist
        run: |
          rm -rf "$GITHUB_WORKSPACE/frontend/dist"
          mkdir -p "$GITHUB_WORKSPACE/frontend/dist"
          cp -a "$GITHUB_WORKSPACE/frontend-dist-gz"/. "$GITHUB_WORKSPACE/frontend/dist/"
      - name: Build package
        working-directory: /home/me/Entware
        run: |
          printf '\nsrc-link keenPbr %s/packages/keenetic\n' "$GITHUB_WORKSPACE" >> feeds.conf
          ./scripts/feeds update keenPbr
          ./scripts/feeds install -p keenPbr keen-pbr
          cat "$GITHUB_WORKSPACE/packages/keenetic/packages.config" >> .config
          make defconfig
          make package/keen-pbr/compile V=s "-j$(nproc)" KEEN_PBR_SRC="$GITHUB_WORKSPACE"
      - name: Collect artifacts
        run: |
          mkdir -p release_files
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' packages/keenetic/keen-pbr/Makefile | head -1)
          find /home/me/Entware/bin -type f -path '*/packages/*.ipk' -name 'keen-pbr*.ipk' | while read -r f; do
            cp "$f" "release_files/keen-pbr_${PKG_VERSION}_keenetic_mipsel-3.4.ipk"
          done
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: "keen-pbr-keenetic-mipsel-3.4"
          path: release_files/*.ipk
