name: Build Debian packages

on:
  push:
    branches: ['**']
    tags: ["v-*"]
  workflow_dispatch:

jobs:
  build:
    name: ubuntu-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            debhelper \
            dpkg-dev \
            file \
            g++ \
            libcurl4-openssl-dev \
            libfmt-dev \
            libnl-3-dev \
            libnl-route-3-dev \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            rsync

      - name: Build Debian packages
        run: make deb

      - name: Collect artifacts
        run: |
          mkdir -p normalized_files
          find release_files -maxdepth 1 -type f -name '*.deb' | while read -r f; do
            BASENAME=$(basename "$f")
            PKG_NAME="${BASENAME%%_*}"
            VERSION_RELEASE=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_([^_]+)_.+$/\1/')
            DPKG_ARCH=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_[^_]+_([^.]+)\.deb$/\1/')
            cp "$f" "normalized_files/${PKG_NAME}_${VERSION_RELEASE}_debian_${DPKG_ARCH}.deb"
          done
          rm -f release_files/*.deb
          cp normalized_files/*.deb release_files/

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v6
        with:
          name: keen-pbr-deb-ubuntu-amd64
          path: release_files/*.deb

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v-')
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*.deb
