name: Build OpenWrt packages

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt release (e.g. 24.10.4)'
        required: true
        default: '24.10.4'

jobs:
  prepare-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v6
        with:
          path: src
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build frontend
        run: bun run build
      - name: Keep only .gz frontend assets
        run: |
          mkdir -p "$GITHUB_WORKSPACE/frontend-dist-gz"
          cd dist
          find . -type f -name '*.gz' -exec cp --parents {} "$GITHUB_WORKSPACE/frontend-dist-gz" \;
      - name: Upload frontend bundle
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist-gz
          path: frontend-dist-gz

  build:
    name: "mediatek/filogic"
    runs-on: ubuntu-latest
    needs: prepare-frontend
    steps:
      - uses: actions/checkout@v6
        with:
          path: src
          submodules: recursive
      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-gz
          path: frontend-dist-gz
      - name: Stage frontend dist
        run: |
          rm -rf "$GITHUB_WORKSPACE/src/frontend/dist"
          mkdir -p "$GITHUB_WORKSPACE/src/frontend/dist"
          cp -a "$GITHUB_WORKSPACE/frontend-dist-gz"/. "$GITHUB_WORKSPACE/src/frontend/dist/"
      - name: Cache SDK
        id: cache
        uses: actions/cache@v5
        with:
          path: openwrt-sdk-*/
          key: sdk-${{ inputs.openwrt_version || '24.10.4' }}-mediatek-filogic
      - name: Download SDK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ inputs.openwrt_version || '24.10.4' }}"
          SDK=$(curl -s "https://downloads.openwrt.org/releases/${VER}/targets/mediatek/filogic/" \
            | grep -o 'openwrt-sdk-[^"]*\.tar\.zst' | head -1)
          wget "https://downloads.openwrt.org/releases/${VER}/targets/mediatek/filogic/${SDK}"
          tar --zstd -xf "${SDK}" && rm "${SDK}"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev \
            file wget
      - name: Build package
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          cp -r src/packages/openwrt/keen-pbr "$SDK_DIR/package/"
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp ../src/packages/openwrt/packages.config .config
          make defconfig
          make package/keen-pbr/compile V=s "-j$(nproc)" KEEN_PBR_SRC="$GITHUB_WORKSPACE/src"
      - name: Collect artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          mkdir -p release_files
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' src/packages/openwrt/keen-pbr/Makefile | head -1)
          PKG_RELEASE=$(sed -n 's/^PKG_RELEASE:=//p' src/packages/openwrt/keen-pbr/Makefile | head -1)
          VERSION_RELEASE="${PKG_VERSION}-${PKG_RELEASE}"
          find "$SDK_DIR/bin" -type f \( -name "keen-pbr_*.ipk" -o -name "keen-pbr_*.apk" \) | while read -r f; do
            EXT="${f##*.}"
            BASENAME=$(basename "$f")
            PKG_ARCH=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_[^_]+_(.+)\.[^.]+$/\1/')
            cp "$f" "release_files/keen-pbr_${VERSION_RELEASE}_openwrt_mediatek_filogic_${PKG_ARCH}.${EXT}"
          done
          find "$SDK_DIR/bin" -type f \( -name "keen-pbr-headless_*.ipk" -o -name "keen-pbr-headless_*.apk" \) | while read -r f; do
            EXT="${f##*.}"
            BASENAME=$(basename "$f")
            PKG_ARCH=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_[^_]+_(.+)\.[^.]+$/\1/')
            cp "$f" "release_files/keen-pbr-headless_${VERSION_RELEASE}_openwrt_mediatek_filogic_${PKG_ARCH}.${EXT}"
          done
      - name: Upload validation artifacts
        uses: actions/upload-artifact@v6
        with:
          name: keen-pbr-validate
          path: |
            release_files/*.ipk
            release_files/*.apk
