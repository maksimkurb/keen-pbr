name: Build OpenWrt packages

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt release (e.g. 24.10.4)'
        required: true
        default: '24.10.4'

jobs:
  build:
    name: "mediatek/filogic"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          submodules: recursive
      - name: Cache SDK
        id: cache
        uses: actions/cache@v4
        with:
          path: openwrt-sdk-*/
          key: sdk-${{ inputs.openwrt_version || '24.10.4' }}-mediatek-filogic
      - name: Download SDK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ inputs.openwrt_version || '24.10.4' }}"
          SDK=$(curl -s "https://downloads.openwrt.org/releases/${VER}/targets/mediatek/filogic/" \
            | grep -o 'openwrt-sdk-[^"]*\.tar\.zst' | head -1)
          wget "https://downloads.openwrt.org/releases/${VER}/targets/mediatek/filogic/${SDK}"
          tar --zstd -xf "${SDK}" && rm "${SDK}"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev \
            file wget
      - name: Build package
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          cp -r src/packages/openwrt/keen-pbr "$SDK_DIR/package/"
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp ../src/packages/openwrt/packages.config .config
          make defconfig
          make package/keen-pbr/compile V=s "-j$(nproc)" KEEN_PBR3_SRC="$GITHUB_WORKSPACE/src"
      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keen-pbr-validate
          path: |
            openwrt-sdk-*/bin/**/*.ipk
            openwrt-sdk-*/bin/**/*.apk
