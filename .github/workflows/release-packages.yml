name: Release packages

on:
  push:
    tags: ["v*"]

permissions:
  actions: read
  contents: write

jobs:
  prepare-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - name: Build frontend
        run: make frontend-build
      - name: Prepare frontend artifact
        run: |
          rm -rf "$GITHUB_WORKSPACE/frontend-artifact"
          mkdir -p "$GITHUB_WORKSPACE/frontend-artifact"
          cp -a "$GITHUB_WORKSPACE/frontend/dist"/. "$GITHUB_WORKSPACE/frontend-artifact"/
      - name: Upload frontend bundle
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend-artifact

  openwrt:
    needs: [prepare-frontend]
    strategy:
      fail-fast: false
      matrix:
        openwrt_version: ["24.10.4", "25.12.2"]
    uses: ./.github/workflows/reusable-openwrt-packages.yml
    with:
      build_scope: full
      openwrt_version: ${{ matrix.openwrt_version }}
      frontend_artifact_name: frontend-dist
    secrets: inherit

  keenetic:
    needs: [prepare-frontend]
    uses: ./.github/workflows/reusable-keenetic-packages.yml
    with:
      build_scope: full
      keenetic_version: current
      frontend_artifact_name: frontend-dist
    secrets: inherit

  debian:
    needs: [prepare-frontend]
    uses: ./.github/workflows/reusable-deb-packages.yml
    with:
      build_scope: full
      frontend_artifact_name: frontend-dist
    secrets: inherit

  publish-repository:
    needs: [openwrt, keenetic, debian]
    uses: ./.github/workflows/reusable-publish-repository.yml
    with:
      target_root: stable
      source_ref_type: tag
      source_ref_name: ${{ github.ref_name }}
      source_pr_number: ""
    secrets: inherit

  draft-release:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    needs: [openwrt, keenetic, debian]
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: release_files
          merge-multiple: true
      - name: Show downloaded artifact tree
        run: |
          if command -v tree >/dev/null 2>&1; then
            tree release_files
          else
            find release_files -print | sort
          fi
      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release_assets
          declare -A seen_basenames=()

          mapfile -t asset_files < <(
            find release_files -type f \
              \( -name '*.ipk' -o -name '*.apk' -o -name '*.deb' \) \
              | sort
          )

          if [ "${#asset_files[@]}" -eq 0 ]; then
            echo "No release package files were found under release_files" >&2
            exit 1
          fi

          for asset in "${asset_files[@]}"; do
            asset_name="$(basename "$asset")"
            if [ -n "${seen_basenames[$asset_name]:-}" ]; then
              echo "Duplicate release asset basename detected: $asset_name" >&2
              echo "Conflicting files:" >&2
              echo "  ${seen_basenames[$asset_name]}" >&2
              echo "  $asset" >&2
              exit 1
            fi
            seen_basenames[$asset_name]="$asset"
            cp "$asset" "release_assets/$asset_name"
          done

      - name: Prepare draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true

      - name: Publish draft release in batches
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_NAME: ${{ github.ref_name }}
          OVERWRITE_FILES: "true"
          BATCH_SIZE: "100"
          RETRY_SLEEP_SECONDS: "30"
          MAX_ATTEMPTS: "3"
        run: |
          set -euo pipefail

          shopt -s nullglob
          mapfile -t asset_files < <(printf '%s\n' release_assets/* | sort)

          if [ "${#asset_files[@]}" -eq 0 ]; then
            echo "No release assets were prepared under release_assets" >&2
            exit 1
          fi

          echo "Publishing release assets for ${RELEASE_NAME} (${TAG_NAME})"
          gh release view "$TAG_NAME" >/dev/null

          batch_size="$BATCH_SIZE"
          sleep_seconds="$RETRY_SLEEP_SECONDS"
          max_attempts="$MAX_ATTEMPTS"
          total_files="${#asset_files[@]}"

          for ((start=0; start<total_files; start+=batch_size)); do
            batch=( "${asset_files[@]:start:batch_size}" )
            batch_number=$((start / batch_size + 1))
            batch_last_index=$((start + ${#batch[@]}))
            upload_cmd=(gh release upload "$TAG_NAME")

            if [ "$OVERWRITE_FILES" = "true" ]; then
              upload_cmd+=(--clobber)
            fi

            upload_cmd+=("${batch[@]}")

            attempt=1
            while true; do
              echo "Uploading batch ${batch_number}: files $((start + 1))-${batch_last_index} of ${total_files} (attempt ${attempt}/${max_attempts})"

              if "${upload_cmd[@]}"; then
                break
              fi

              if (( attempt >= max_attempts )); then
                echo "Batch ${batch_number} failed after ${max_attempts} attempts" >&2
                exit 1
              fi

              echo "Batch ${batch_number} failed; waiting ${sleep_seconds} seconds before retry"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done

            if (( batch_last_index < total_files )); then
              echo "Waiting ${sleep_seconds} seconds before the next batch"
              sleep "$sleep_seconds"
            fi
          done
