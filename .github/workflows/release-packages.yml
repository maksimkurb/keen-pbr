name: Release packages

on:
  push:
    tags: ["v-*"]

permissions:
  contents: write

jobs:
  prepare-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build frontend
        run: bun run build
      - name: Keep only .gz frontend assets
        run: |
          mkdir -p "$GITHUB_WORKSPACE/frontend-dist-gz"
          cd dist
          find . -type f -name '*.gz' -exec cp --parents {} "$GITHUB_WORKSPACE/frontend-dist-gz" \;
      - name: Upload frontend bundle
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist-gz
          path: frontend-dist-gz

  openwrt:
    needs: [prepare-frontend]
    strategy:
      fail-fast: false
      matrix:
        openwrt_version: ["24.10.4", "25.12.2"]
    uses: ./.github/workflows/reusable-openwrt-packages.yml
    with:
      build_scope: full
      openwrt_version: ${{ matrix.openwrt_version }}
      frontend_artifact_name: frontend-dist-gz
    secrets: inherit

  keenetic:
    needs: [prepare-frontend]
    uses: ./.github/workflows/reusable-keenetic-packages.yml
    with:
      build_scope: full
      frontend_artifact_name: frontend-dist-gz
    secrets: inherit

  debian:
    needs: [prepare-frontend]
    uses: ./.github/workflows/reusable-deb-packages.yml
    with:
      build_scope: full
      frontend_artifact_name: frontend-dist-gz
    secrets: inherit

  publish-repository:
    needs: [openwrt, keenetic, debian]
    uses: ./.github/workflows/reusable-publish-repository.yml
    with:
      repository_prefix: stable
      keenetic_version: current
      debian_version: bookworm

  draft-release:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    needs: [openwrt, keenetic, debian]
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: release_files
          merge-multiple: true
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          overwrite_files: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release_files/*
