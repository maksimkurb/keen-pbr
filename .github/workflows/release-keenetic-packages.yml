name: Release Keenetic packages

on:
  push:
    tags: ["v-*"]
  workflow_dispatch:
    inputs:
      configs:
        description: 'Config filter (comma-separated, empty = all)'
        required: false

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.gen.outputs.job-config }}
    steps:
      - name: Generate config matrix
        id: gen
        env:
          CONFIGS_INPUT: ${{ inputs.configs }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          all_configs = [
              "aarch64-3.10.config",
              "mips-3.4.config",
              "mipsel-3.4.config",
              "x64-3.2.config",
              "armv7-3.2.config",
          ]

          raw = os.environ.get("CONFIGS_INPUT", "")
          selected = [item.strip() for item in raw.split(",") if item.strip()]
          builds = [cfg for cfg in all_configs if cfg in selected] if selected else all_configs

          matrix = []
          for config in builds:
              matrix.append(
                  {
                      "config_file": config,
                      "config_name": config.removesuffix(".config"),
                  }
              )

          print(f"job-config={json.dumps(matrix)}")
          PY

  build:
    name: "${{ matrix.build_env.config_name }}"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      fail-fast: false
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
    container:
      image: ghcr.io/maksimkurb/entware-builder:${{ matrix.build_env.config_name }}
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build package
        working-directory: /home/me/Entware
        run: |
          printf '\nsrc-link keenPbr %s/packages/keenetic\n' "$GITHUB_WORKSPACE" >> feeds.conf
          ./scripts/feeds update keenPbr
          ./scripts/feeds install -p keenPbr keen-pbr
          cat "$GITHUB_WORKSPACE/packages/keenetic/packages.config" >> .config
          make defconfig
          make package/keen-pbr/compile V=s "-j$(nproc)" KEEN_PBR3_SRC="$GITHUB_WORKSPACE"
      - name: Collect artifacts
        run: |
          mkdir -p release_files
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' packages/keenetic/keen-pbr/Makefile | head -1)
          find /home/me/Entware/bin -type f -path '*/packages/*.ipk' -name 'keen-pbr*.ipk' | while read -r f; do
            cp "$f" "release_files/keen-pbr_${PKG_VERSION}_keenetic_${{ matrix.build_env.config_name }}.ipk"
          done
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "keen-pbr-keenetic-${{ matrix.build_env.config_name }}"
          path: release_files/*.ipk
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*.ipk
