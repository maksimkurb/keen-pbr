name: Reusable repository publisher

on:
  workflow_call:
    inputs:
      target_root:
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          path: src

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: src/build/packages
          merge-multiple: true

      - name: Checkout repository branch
        uses: actions/checkout@v6
        with:
          ref: repository
          fetch-depth: 1

      - name: Publish package tree
        run: |
          make -C "$GITHUB_WORKSPACE/src" build-repository \
            REPO_DIR="$GITHUB_WORKSPACE" \
            REPO_TARGET_ROOT="${{ inputs.target_root }}" \
            REPO_SLUG="${{ github.repository }}"

      - name: Commit and push repository changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --cached --quiet; then
            echo "No repository updates to publish"
            exit 0
          fi

          git commit -m "publish repository tree for ${GITHUB_SHA}"
          git push origin HEAD:repository
