name: Reusable repository publisher

on:
  workflow_call:
    inputs:
      repository_prefix:
        required: true
        type: string
      keenetic_version:
        required: false
        type: string
        default: "current"
      debian_version:
        required: false
        type: string
        default: "bookworm"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          path: src

      - name: Install repository index tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils python3

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: release_files
          merge-multiple: true
          if-no-files-found: warn

      - name: Checkout repository branch
        uses: actions/checkout@v6
        with:
          ref: repository
          path: site

      - name: Publish package tree
        env:
          REPOSITORY_PREFIX: ${{ inputs.repository_prefix }}
          KEENETIC_VERSION: ${{ inputs.keenetic_version }}
          DEBIAN_VERSION: ${{ inputs.debian_version }}
        run: |
          set -euo pipefail

          sanitize_segment() {
            printf '%s' "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#-+#-#g; s#(^-+|-+$)##g'
          }

          sanitize_path() {
            local raw="$1"
            local out=""
            local IFS='/'
            read -ra parts <<< "$raw"
            for part in "${parts[@]}"; do
              [ -z "$part" ] && continue
              part=$(sanitize_segment "$part")
              [ -z "$part" ] && continue
              if [ -z "$out" ]; then
                out="$part"
              else
                out="$out/$part"
              fi
            done
            printf '%s' "$out"
          }

          PREFIX=$(sanitize_path "$REPOSITORY_PREFIX")
          if [ -z "$PREFIX" ]; then
            echo "repository_prefix resolved to an empty path"
            exit 1
          fi

          ROOT_DIR="$GITHUB_WORKSPACE/site/$PREFIX"
          mkdir -p "$ROOT_DIR"

          find "$GITHUB_WORKSPACE/release_files" -type f \( -name '*.ipk' -o -name '*.apk' -o -name '*.deb' -o -name '*.adb' \) | while read -r f; do
            base=$(basename "$f")
            output_name="$base"

            case "$base" in
              *_openwrt_*.ipk|*_openwrt_*.apk)
                # <pkg>_<version-release>_openwrt_<openwrt-version>_<target>_<subtarget>_<pkgarch>.<ext>
                rest="${base#*_openwrt_}"
                owrt_version=$(printf '%s' "$rest" | cut -d'_' -f1)
                pkg_arch_ext=$(printf '%s' "$rest" | awk -F'_' '{print $NF}')
                pkg_arch="${pkg_arch_ext%.*}"
                dest="$ROOT_DIR/openwrt/$(sanitize_segment "$owrt_version")/$(sanitize_segment "$pkg_arch")"
                ;;
              packages_openwrt_*.adb)
                # packages_openwrt_<openwrt-version>_<target>_<subtarget>_<pkgarch>.adb
                rest="${base#packages_openwrt_}"
                owrt_version=$(printf '%s' "$rest" | cut -d'_' -f1)
                pkg_arch_ext=$(printf '%s' "$rest" | awk -F'_' '{print $NF}')
                pkg_arch="${pkg_arch_ext%.adb}"
                dest="$ROOT_DIR/openwrt/$(sanitize_segment "$owrt_version")/$(sanitize_segment "$pkg_arch")"
                output_name="packages.adb"
                ;;

              *_keenetic_*.ipk)
                # <pkg>_<version-release>_keenetic_<config>.ipk
                config_ext="${base#*_keenetic_}"
                config_name="${config_ext%.ipk}"
                pkg_arch=$(printf '%s' "$config_name" | cut -d'-' -f1)
                dest="$ROOT_DIR/keenetic/$(sanitize_segment "$KEENETIC_VERSION")/$(sanitize_segment "$pkg_arch")"
                ;;

              *_debian_*.deb)
                # <pkg>_<version-release>_debian_<dpkg-arch>.deb
                pkg_arch_ext="${base#*_debian_}"
                pkg_arch="${pkg_arch_ext%.deb}"
                dest="$ROOT_DIR/debian/$(sanitize_segment "$DEBIAN_VERSION")/$(sanitize_segment "$pkg_arch")"
                ;;

              *)
                echo "Skip unknown artifact format: $base"
                continue
                ;;
            esac

            mkdir -p "$dest"
            cp "$f" "$dest/$output_name"
          done

      - name: Generate repository index files
        run: |
          set -euo pipefail

          # Generate OpenWrt/Keenetic opkg feed metadata.
          mapfile -t ipk_dirs < <(find "$GITHUB_WORKSPACE/site" -type f -name '*.ipk' -printf '%h\n' | sort -u)
          for dir in "${ipk_dirs[@]}"; do
            (
              cd "$dir"
              python3 "$GITHUB_WORKSPACE/src/scripts/ipk-make-index.py" .
            )
          done

          # Generate Debian flat-repo metadata so `deb <url> ./` can work.
          mapfile -t deb_dirs < <(find "$GITHUB_WORKSPACE/site" -type f -name '*.deb' -printf '%h\n' | sort -u)
          for dir in "${deb_dirs[@]}"; do
            (
              cd "$dir"
              dpkg-scanpackages --multiversion . /dev/null > Packages
              gzip -n9c Packages > Packages.gz
              apt-ftparchive release . > Release
            )
          done

      - name: Commit and push repository changes
        working-directory: site
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --cached --quiet; then
            echo "No repository updates to publish"
            exit 0
          fi

          git commit -m "publish repository tree for ${GITHUB_SHA}"
          git push origin repository
