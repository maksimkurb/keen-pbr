name: Reusable repository publisher

on:
  workflow_call:
    inputs:
      repository_prefix:
        required: true
        type: string
      keenetic_version:
        required: false
        type: string
        default: "current"
      debian_version:
        required: false
        type: string
        default: "bookworm"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: build/packages
          merge-multiple: true
          if-no-files-found: warn

      - name: Checkout repository branch
        uses: actions/checkout@v6
        with:
          ref: repository
          path: site

      - name: Publish package tree
        run: |
          make build-repository \
            REPO_DIR="$GITHUB_WORKSPACE/site" \
            REPO_PREFIX="${{ inputs.repository_prefix }}" \
            KEENETIC_VERSION="${{ inputs.keenetic_version }}" \
            DEBIAN_VERSION="${{ inputs.debian_version }}"

      - name: Commit and push repository changes
        working-directory: site
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --cached --quiet; then
            echo "No repository updates to publish"
            exit 0
          fi

          git commit -m "publish repository tree for ${GITHUB_SHA}"
          git push origin repository
