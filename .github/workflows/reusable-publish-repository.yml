name: Reusable repository publisher

on:
  workflow_call:
    inputs:
      target_root:
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: package-builder
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          path: src

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: downloaded-artifacts

      - name: Show downloaded artifact tree
        run: |
          if command -v tree >/dev/null 2>&1; then
            tree downloaded-artifacts
          else
            find downloaded-artifacts -print | sort
          fi

      - name: Normalize downloaded package artifacts
        run: |
          set -euo pipefail
          rm -rf "$GITHUB_WORKSPACE/src/build/packages"
          mkdir -p "$GITHUB_WORKSPACE/src/build/packages/openwrt" \
                   "$GITHUB_WORKSPACE/src/build/packages/keenetic" \
                   "$GITHUB_WORKSPACE/src/build/packages/debian"

          shopt -s nullglob

          for artifact_dir in "$GITHUB_WORKSPACE"/downloaded-artifacts/packages-openwrt-*; do
            cp -a "$artifact_dir"/. "$GITHUB_WORKSPACE/src/build/packages/openwrt"/
          done

          for artifact_dir in "$GITHUB_WORKSPACE"/downloaded-artifacts/packages-keenetic-*; do
            cp -a "$artifact_dir"/. "$GITHUB_WORKSPACE/src/build/packages/keenetic"/
          done

          for artifact_dir in "$GITHUB_WORKSPACE"/downloaded-artifacts/packages-debian-*; do
            cp -a "$artifact_dir"/. "$GITHUB_WORKSPACE/src/build/packages/debian"/
          done

      - name: Normalize publish target root
        id: normalized-target-root
        shell: bash
        run: |
          set -euo pipefail

          sanitize_segment() {
            printf '%s' "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#-+#-#g; s#(^-+|-+$)##g'
          }

          sanitize_path() {
            local raw="$1"
            local out=""
            local part=""
            local IFS='/'
            read -ra parts <<< "$raw"
            for part in "${parts[@]}"; do
              [ -z "$part" ] && continue
              part="$(sanitize_segment "$part")"
              [ -z "$part" ] && continue
              if [ -z "$out" ]; then
                out="$part"
              else
                out="$out/$part"
              fi
            done
            printf '%s' "$out"
          }

          normalized_target_root="$(sanitize_path "${{ inputs.target_root }}")"
          if [ -z "$normalized_target_root" ]; then
            echo "target_root resolved to an empty path" >&2
            exit 1
          fi

          echo "value=$normalized_target_root" >> "$GITHUB_OUTPUT"

      - name: Checkout publish repository
        env:
          PUBLISH_REPOSITORY_TOKEN: ${{ secrets.publish_repository_token || secrets.PUBLISH_REPOSITORY_TOKEN }}
        run: |
          set -euo pipefail
          : "${PUBLISH_REPOSITORY_TOKEN:?publish_repository_token or PUBLISH_REPOSITORY_TOKEN secret is required}"
          git clone --branch main --depth=1 --filter=blob:none --sparse \
            "https://x-access-token:${PUBLISH_REPOSITORY_TOKEN}@github.com/maksimkurb/keen-pbr-repository.git" \
            "$GITHUB_WORKSPACE/publish"
          git -C "$GITHUB_WORKSPACE/publish" sparse-checkout set \
            "repository/${{ steps.normalized-target-root.outputs.value }}"

      - name: Publish package tree
        run: |
          make -C "$GITHUB_WORKSPACE/src" build-repository \
            REPO_DIR="$GITHUB_WORKSPACE/publish" \
            REPO_TARGET_ROOT="repository/${{ steps.normalized-target-root.outputs.value }}"

      - name: Commit and push repository changes
        working-directory: publish
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add repository
          if git diff --cached --quiet; then
            echo "No repository updates to publish"
            exit 0
          fi

          git commit -m "publish repository tree for ${GITHUB_SHA}"
          git push origin HEAD:main
