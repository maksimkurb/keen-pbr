name: Reusable Debian packages

on:
  workflow_call:
    inputs:
      build_scope:
        required: true
        type: string
      frontend_artifact_name:
        required: false
        type: string
        default: "frontend-dist-gz"

jobs:
  build:
    name: ubuntu-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.frontend_artifact_name }}
          path: frontend-dist-gz
      - name: Stage frontend dist
        run: |
          rm -rf "$GITHUB_WORKSPACE/frontend/dist"
          mkdir -p "$GITHUB_WORKSPACE/frontend/dist"
          cp -a "$GITHUB_WORKSPACE/frontend-dist-gz"/. "$GITHUB_WORKSPACE/frontend/dist/"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            debhelper \
            dpkg-dev \
            file \
            g++ \
            libcurl4-openssl-dev \
            libfmt-dev \
            libnl-3-dev \
            libnl-route-3-dev \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            rsync
      - name: Build Debian packages
        run: KEEN_PBR_FRONTEND_DIST="$GITHUB_WORKSPACE/frontend/dist" make deb
      - name: Collect artifacts
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          mkdir -p normalized_files
          find release_files -maxdepth 1 -type f -name '*.deb' | while read -r f; do
            BASENAME=$(basename "$f")
            PKG_NAME="${BASENAME%%_*}"
            VERSION_RELEASE=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_([^_]+)_.+$/\1/')
            DPKG_ARCH=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_[^_]+_([^.]+)\.deb$/\1/')
            cp "$f" "normalized_files/${PKG_NAME}_${VERSION_RELEASE}_debian_${DPKG_ARCH}.deb"
          done
          rm -f release_files/*.deb
          cp normalized_files/*.deb release_files/

          # Build Debian flat-repo metadata per architecture in build environment.
          for DPKG_ARCH in $(find release_files -maxdepth 1 -type f -name '*_debian_*.deb' -printf '%f\n' | sed -E 's/^.*_debian_([^.]+)\.deb$/\1/' | sort -u); do
            TMP_DIR="release_files/deb-index-${DPKG_ARCH}"
            rm -rf "$TMP_DIR"
            mkdir -p "$TMP_DIR"
            find release_files -maxdepth 1 -type f -name "*_debian_${DPKG_ARCH}.deb" -exec cp {} "$TMP_DIR/" \;
            (
              cd "$TMP_DIR"
              dpkg-scanpackages --multiversion . /dev/null > Packages
              gzip -n9c Packages > Packages.gz
              apt-ftparchive release . > Release
            )
            cp "$TMP_DIR/Packages" "release_files/Packages_debian_${DPKG_ARCH}"
            cp "$TMP_DIR/Packages.gz" "release_files/Packages_debian_${DPKG_ARCH}.gz"
            cp "$TMP_DIR/Release" "release_files/Release_debian_${DPKG_ARCH}"
            rm -rf "$TMP_DIR"
          done
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-debian-amd64
          path: |
            release_files/*.deb
            release_files/Packages_debian_*
            release_files/Packages_debian_*.gz
            release_files/Release_debian_*
