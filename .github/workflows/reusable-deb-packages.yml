name: Reusable Debian packages

on:
  workflow_call:
    inputs:
      build_scope:
        required: true
        type: string
      frontend_artifact_name:
        required: false
        type: string
        default: "frontend-dist-gz"

jobs:
  build:
    name: ubuntu-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.frontend_artifact_name }}
          path: frontend-dist-gz
      - name: Stage frontend dist
        run: |
          rm -rf "$GITHUB_WORKSPACE/frontend/dist"
          mkdir -p "$GITHUB_WORKSPACE/frontend/dist"
          cp -a "$GITHUB_WORKSPACE/frontend-dist-gz"/. "$GITHUB_WORKSPACE/frontend/dist/"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            debhelper \
            dpkg-dev \
            file \
            g++ \
            libcurl4-openssl-dev \
            libfmt-dev \
            libnl-3-dev \
            libnl-route-3-dev \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            rsync
      - name: Build Debian packages
        run: make deb
      - name: Collect artifacts
        run: |
          mkdir -p normalized_files
          find release_files -maxdepth 1 -type f -name '*.deb' | while read -r f; do
            BASENAME=$(basename "$f")
            PKG_NAME="${BASENAME%%_*}"
            VERSION_RELEASE=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_([^_]+)_.+$/\1/')
            DPKG_ARCH=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_[^_]+_([^.]+)\.deb$/\1/')
            cp "$f" "normalized_files/${PKG_NAME}_${VERSION_RELEASE}_debian_${DPKG_ARCH}.deb"
          done
          rm -f release_files/*.deb
          cp normalized_files/*.deb release_files/
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-debian-amd64
          path: release_files/*.deb
