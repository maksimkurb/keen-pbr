name: Reusable Debian packages

on:
  workflow_call:
    inputs:
      build_scope:
        required: true
        type: string
      frontend_artifact_name:
        required: false
        type: string
        default: "frontend-dist"

jobs:
  build:
    name: ubuntu-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v4
      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.frontend_artifact_name }}
          path: frontend-artifact
      - name: Stage frontend dist
        run: |
          rm -rf "$GITHUB_WORKSPACE/frontend/dist"
          mkdir -p "$GITHUB_WORKSPACE/frontend/dist"
          cp -a "$GITHUB_WORKSPACE/frontend-artifact"/. "$GITHUB_WORKSPACE/frontend/dist/"
      - name: Cache Debian image layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache-debian
          key: buildx-debian-${{ hashFiles('docker/Dockerfile.debian-builder') }}
      - name: Build and collect Debian packages
        run: |
          make deb-packages \
            DEBIAN_DOCKER_CACHE_FROM="/tmp/.buildx-cache-debian" \
            DEBIAN_DOCKER_CACHE_TO="/tmp/.buildx-cache-debian-new"
      - name: Persist Debian image cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache-debian
          if [ -d /tmp/.buildx-cache-debian-new ]; then
            mv /tmp/.buildx-cache-debian-new /tmp/.buildx-cache-debian
          fi
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-debian-amd64
          path: build/packages/debian
