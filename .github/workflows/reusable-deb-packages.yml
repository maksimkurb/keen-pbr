name: Reusable Debian packages

on:
  workflow_call:
    inputs:
      build_scope:
        required: true
        type: string
      frontend_artifact_name:
        required: false
        type: string
        default: "frontend-dist"
      use_signing_secrets:
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: ubuntu-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v4
      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.frontend_artifact_name }}
          path: frontend-artifact
      - name: Stage frontend dist
        run: |
          rm -rf "$GITHUB_WORKSPACE/frontend/dist"
          mkdir -p "$GITHUB_WORKSPACE/frontend/dist"
          cp -a "$GITHUB_WORKSPACE/frontend-artifact"/. "$GITHUB_WORKSPACE/frontend/dist/"
      - name: Cache Debian image layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache-debian
          key: buildx-debian-${{ hashFiles('docker/Dockerfile.debian-builder') }}
      - name: Build Debian packages
        run: |
          make deb-packages \
            DEBIAN_DOCKER_CACHE_FROM="/tmp/.buildx-cache-debian" \
            DEBIAN_DOCKER_CACHE_TO="/tmp/.buildx-cache-debian-new"
      - name: Persist Debian image cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache-debian
          if [ -d /tmp/.buildx-cache-debian-new ]; then
            mv /tmp/.buildx-cache-debian-new /tmp/.buildx-cache-debian
          fi
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: staging-debian-amd64
          path: build/packages/debian

  sign:
    if: ${{ inputs.use_signing_secrets }}
    name: ubuntu-amd64
    runs-on: ubuntu-latest
    environment: package-builder
    needs: [build]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Download unsigned package artifacts
        uses: actions/download-artifact@v8
        with:
          name: staging-debian-amd64
          path: build/packages/debian
      - name: Sign Debian repository metadata
        env:
          DEBIAN_GPG_PRIVATE_KEY: ${{ secrets.DEBIAN_GPG_PRIVATE_KEY }}
        run: |
          bash ./build_scripts/sign-debian-repository.sh \
            "$GITHUB_WORKSPACE/build/packages"
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-debian-amd64
          path: build/packages/debian
