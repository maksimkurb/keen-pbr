name: Release OpenWrt packages

on:
  push:
    tags: ["v-*"]
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt release (e.g. 24.10.4)'
        required: true
        default: '24.10.4'
      targets:
        description: 'Targets filter (comma-separated, empty = all)'
        required: false
      subtargets:
        description: 'Subtargets filter (comma-separated, empty = all)'
        required: false

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.gen.outputs.job-config }}
    steps:
      - uses: actions/checkout@v5
        with:
          path: src
          submodules: recursive
      - name: Generate matrix
        id: gen
        working-directory: src/.github/builder
        run: |
          python3 generate_build_matrix.py \
            "${{ inputs.openwrt_version || '24.10.4' }}" \
            "${{ inputs.targets }}" \
            "${{ inputs.subtargets }}"

  build:
    name: "${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }} (${{ matrix.build_env.pkgarch }})"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      fail-fast: false
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
    steps:
      - uses: actions/checkout@v5
        with:
          path: src
          submodules: recursive
      - name: Cache SDK
        id: cache
        uses: actions/cache@v4
        with:
          path: openwrt-sdk-*/
          key: sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}
      - name: Download SDK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ matrix.build_env.tag }}"
          SDK="${{ matrix.build_env.sdk_file }}"
          wget "https://downloads.openwrt.org/releases/${VER}/targets/${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}/${SDK}"
          tar --zstd -xf "${SDK}" && rm "${SDK}"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev \
            file wget
      - name: Build package
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          cp -r src/packages/openwrt/keen-pbr "$SDK_DIR/package/"
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp ../src/packages/openwrt/packages.config .config
          make defconfig
          make package/keen-pbr/compile V=s "-j$(nproc)" KEEN_PBR_SRC="$GITHUB_WORKSPACE/src"
      - name: Collect artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          mkdir -p release_files
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' src/packages/openwrt/keen-pbr/Makefile | head -1)
          find "$SDK_DIR/bin" -type f \( -name "keen-pbr*.ipk" -o -name "keen-pbr*.apk" \) | while read -r f; do
            EXT="${f##*.}"
            cp "$f" "release_files/keen-pbr_${PKG_VERSION}_openwrt_${{ matrix.build_env.target }}_${{ matrix.build_env.subtarget }}.${EXT}"
          done
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: "keen-pbr-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}"
          path: |
            release_files/*.ipk
            release_files/*.apk
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_files/*.ipk
            release_files/*.apk
