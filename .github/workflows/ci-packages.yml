name: Build packages

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  prepare-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build frontend
        run: bun run build
      - name: Keep only .gz frontend assets
        run: |
          mkdir -p "$GITHUB_WORKSPACE/frontend-dist-gz"
          cd dist
          find . -type f -name '*.gz' -exec cp --parents {} "$GITHUB_WORKSPACE/frontend-dist-gz" \;
      - name: Upload frontend bundle
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist-gz
          path: frontend-dist-gz

  openwrt:
    needs: [prepare-frontend]
    strategy:
      fail-fast: false
      matrix:
        openwrt_version: ["24.10.4", "25.12.2"]
    uses: ./.github/workflows/reusable-openwrt-packages.yml
    with:
      build_scope: default
      openwrt_version: ${{ matrix.openwrt_version }}
      frontend_artifact_name: frontend-dist-gz
    secrets: inherit

  keenetic:
    needs: [prepare-frontend]
    uses: ./.github/workflows/reusable-keenetic-packages.yml
    with:
      build_scope: default
      frontend_artifact_name: frontend-dist-gz
    secrets: inherit

  debian:
    needs: [prepare-frontend]
    uses: ./.github/workflows/reusable-deb-packages.yml
    with:
      build_scope: default
      frontend_artifact_name: frontend-dist-gz
    secrets: inherit

  publish-repository:
    needs: [openwrt, keenetic, debian]
    if: always() && startsWith(github.ref, 'refs/heads/')
    uses: ./.github/workflows/reusable-publish-repository.yml
    with:
      repository_prefix: ${{ github.ref_name == 'main' && 'unstable' || format('dev/{0}', github.ref_name) }}
      keenetic_version: current
      debian_version: bookworm
