name: Build frontend

on:
  push:
    branches: ['**']
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  lint:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile
      - name: Run linter
        run: cd frontend && bun run lint

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Build frontend
        run: make frontend-build
