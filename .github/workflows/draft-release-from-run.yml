name: Draft release from workflow run

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing git tag to attach the draft release to
        required: true
        type: string
      release_name:
        description: Optional release title override
        required: false
        default: ""
        type: string
      source_run:
        description: Workflow run ID or full GitHub Actions run URL to download artifacts from
        required: true
        type: string
      source_repository:
        description: Repository that owns the workflow run
        required: false
        default: maksimkurb/keenetic-pbr-go
        type: string
      artifact_pattern:
        description: Artifact name pattern to download
        required: false
        default: packages-*
        type: string

permissions:
  actions: read
  contents: write

jobs:
  draft-release:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve workflow run ID
        id: resolve-run
        shell: bash
        env:
          SOURCE_RUN: ${{ inputs.source_run }}
        run: |
          set -euo pipefail

          run_id="$SOURCE_RUN"
          if [[ "$run_id" =~ /runs/([0-9]+) ]]; then
            run_id="${BASH_REMATCH[1]}"
          fi

          if [[ ! "$run_id" =~ ^[0-9]+$ ]]; then
            echo "source_run must be a workflow run ID or a URL containing /runs/<id>" >&2
            exit 1
          fi

          echo "run-id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.artifact_pattern }}
          path: release_files
          repository: ${{ inputs.source_repository }}
          run-id: ${{ steps.resolve-run.outputs.run-id }}
          github-token: ${{ github.token }}
          merge-multiple: true

      - name: Show downloaded artifact tree
        run: |
          if command -v tree >/dev/null 2>&1; then
            tree release_files
          else
            find release_files -print | sort
          fi

      - name: Collect release assets
        id: collect-release-assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release_assets
          declare -A seen_basenames=()

          mapfile -t asset_files < <(
            find release_files -type f \
              \( -name '*.ipk' -o -name '*.apk' -o -name '*.deb' \) \
              | sort
          )

          if [ "${#asset_files[@]}" -eq 0 ]; then
            echo "No release package files were found under release_files" >&2
            exit 1
          fi

          for asset in "${asset_files[@]}"; do
            asset_name="$(basename "$asset")"
            if [ -n "${seen_basenames[$asset_name]:-}" ]; then
              echo "Duplicate release asset basename detected: $asset_name" >&2
              echo "Conflicting files:" >&2
              echo "  ${seen_basenames[$asset_name]}" >&2
              echo "  $asset" >&2
              exit 1
            fi
            seen_basenames[$asset_name]="$asset"
            cp "$asset" "release_assets/$asset_name"
          done

          {
            echo 'files<<EOF'
            printf '%s\n' release_assets/*
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag_name }}
          draft: true
          overwrite_files: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.collect-release-assets.outputs.files }}
