name: Reusable OpenWrt packages

on:
  workflow_call:
    inputs:
      openwrt_version:
        required: true
        type: string
      architecture:
        required: true
        type: string
      frontend_artifact_name:
        required: false
        type: string
        default: "frontend-dist"
      use_signing_secrets:
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: "build: ${{ inputs.openwrt_version }} / ${{ inputs.architecture }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.frontend_artifact_name }}
          path: frontend-artifact
      - name: Stage frontend dist
        run: |
          rm -rf "$GITHUB_WORKSPACE/frontend/dist"
          mkdir -p "$GITHUB_WORKSPACE/frontend/dist"
          cp -a "$GITHUB_WORKSPACE/frontend-artifact"/. "$GITHUB_WORKSPACE/frontend/dist/"
      - name: Build packages
        env:
          OPENWRT_USIGN_PRIVATE_KEY: ${{ inputs.use_signing_secrets && secrets.OPENWRT_USIGN_PRIVATE_KEY || '' }}
          OPENWRT_APK_PRIVATE_KEY: ${{ inputs.use_signing_secrets && secrets.OPENWRT_APK_PRIVATE_KEY || '' }}
        run: |
          make openwrt-packages \
            OPENWRT_VERSION="${{ inputs.openwrt_version }}" \
            OPENWRT_ARCHITECTURE="${{ inputs.architecture }}"
      - name: Upload signed packaged artifacts
        if: ${{ inputs.use_signing_secrets }}
        uses: actions/upload-artifact@v6
        with:
          name: packages-openwrt-${{ inputs.openwrt_version }}-${{ inputs.architecture }}
          path: build/packages/openwrt
      - name: Upload unsigned packaged artifacts
        if: ${{ !inputs.use_signing_secrets }}
        uses: actions/upload-artifact@v6
        with:
          name: staging-openwrt-${{ inputs.openwrt_version }}-${{ inputs.architecture }}
          path: build/packages/openwrt
      - name: Upload debug symbol artifacts
        uses: actions/upload-artifact@v6
        with:
          name: debug-symbols-openwrt-${{ inputs.openwrt_version }}-${{ inputs.architecture }}
          path: build/packages/openwrt-debug
          if-no-files-found: error
