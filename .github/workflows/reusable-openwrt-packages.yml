name: Reusable OpenWrt packages

on:
  workflow_call:
    inputs:
      build_scope:
        required: true
        type: string
      openwrt_version:
        required: false
        type: string
        default: "24.10.4"
      targets:
        required: false
        type: string
        default: ""
      subtargets:
        required: false
        type: string
        default: ""
      frontend_artifact_name:
        required: false
        type: string
        default: "frontend-dist-gz"

jobs:

  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.gen.outputs.job-config }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: src
          submodules: recursive
      - name: Generate matrix
        id: gen
        working-directory: src/.github/builder
        env:
          BUILD_SCOPE: ${{ inputs.build_scope }}
          INPUT_TARGETS: ${{ inputs.targets }}
          INPUT_SUBTARGETS: ${{ inputs.subtargets }}
          OPENWRT_VERSION: ${{ inputs.openwrt_version }}
        run: |
          TARGETS="$INPUT_TARGETS"
          SUBTARGETS="$INPUT_SUBTARGETS"
          if [ "$BUILD_SCOPE" = "default" ]; then
            TARGETS="mediatek"
            SUBTARGETS="filogic"
          fi
          python3 generate_build_matrix.py "$OPENWRT_VERSION" "$TARGETS" "$SUBTARGETS"

  build:
    name: "${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}${{ matrix.build_env.pkgarch && format(' ({0})', matrix.build_env.pkgarch) || '' }}"
    runs-on: ubuntu-latest
    needs: [generate-config]
    strategy:
      fail-fast: false
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: src
          submodules: recursive
      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.frontend_artifact_name }}
          path: frontend-dist-gz
      - name: Stage frontend dist
        run: |
          rm -rf "$GITHUB_WORKSPACE/src/frontend/dist"
          mkdir -p "$GITHUB_WORKSPACE/src/frontend/dist"
          cp -a "$GITHUB_WORKSPACE/frontend-dist-gz"/. "$GITHUB_WORKSPACE/src/frontend/dist/"
      - name: Cache SDK
        id: cache
        uses: actions/cache@v5
        with:
          path: openwrt-sdk-*/
          key: sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}
      - name: Download SDK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ matrix.build_env.tag }}"
          SDK="${{ matrix.build_env.sdk_file }}"
          wget "https://downloads.openwrt.org/releases/${VER}/targets/${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}/${SDK}"
          tar --zstd -xf "${SDK}" && rm "${SDK}"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev \
            file wget
      - name: Build package
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          cp -r src/packages/openwrt/keen-pbr "$SDK_DIR/package/"
          cp src/version.mk "$SDK_DIR/package/keen-pbr/version.mk"
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp ../src/packages/openwrt/packages.config .config
          make defconfig
          make package/keen-pbr/compile V=s "-j$(nproc)" KEEN_PBR_SRC="$GITHUB_WORKSPACE/src"
      - name: Collect artifacts
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          . "$GITHUB_WORKSPACE/src/version.mk"
          VERSION_RELEASE="${KEEN_PBR_VERSION}-${KEEN_PBR_RELEASE}"
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          SDK_DIR=$(realpath "$SDK_DIR")
          mkdir -p release_files
          ARCH_PREFIX="${{ matrix.build_env.target }}_${{ matrix.build_env.subtarget }}"
          find "$SDK_DIR/bin" -type f \( -name "keen-pbr_*.ipk" -o -name "keen-pbr-*.apk" \) | while read -r f; do
            EXT="${f##*.}"
            PKG_ARCH="${{ matrix.build_env.pkgarch }}"
            if [ -z "$PKG_ARCH" ]; then
              PKG_ARCH=$(printf '%s\n' "$f" | sed -E 's#^.*/bin/packages/([^/]+)/.*$#\1#')
            fi
            if [ -z "$PKG_ARCH" ] || [ "$PKG_ARCH" = "$f" ]; then
              BASENAME=$(basename "$f")
              PKG_ARCH=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_[^_]+_(.+)\.[^.]+$/\1/')
            fi
            cp "$f" "release_files/keen-pbr_${VERSION_RELEASE}_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_${PKG_ARCH}.${EXT}"
          done
          find "$SDK_DIR/bin" -type f \( -name "keen-pbr-headless_*.ipk" -o -name "keen-pbr-headless-*.apk" \) | while read -r f; do
            EXT="${f##*.}"
            PKG_ARCH="${{ matrix.build_env.pkgarch }}"
            if [ -z "$PKG_ARCH" ]; then
              PKG_ARCH=$(printf '%s\n' "$f" | sed -E 's#^.*/bin/packages/([^/]+)/.*$#\1#')
            fi
            if [ -z "$PKG_ARCH" ] || [ "$PKG_ARCH" = "$f" ]; then
              BASENAME=$(basename "$f")
              PKG_ARCH=$(printf '%s\n' "$BASENAME" | sed -E 's/^[^_]+_[^_]+_(.+)\.[^.]+$/\1/')
            fi
            cp "$f" "release_files/keen-pbr-headless_${VERSION_RELEASE}_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_${PKG_ARCH}.${EXT}"
          done

          # Build OpenWrt ipk repository indexes per package architecture.
          IPKG_INDEXER="$SDK_DIR/scripts/ipkg-make-index.sh"
          if [ -x "$IPKG_INDEXER" ]; then
            if ! command -v sha256 >/dev/null 2>&1 && command -v sha256sum >/dev/null 2>&1; then
              TMP_BIN="$GITHUB_WORKSPACE/.tmp-bin"
              mkdir -p "$TMP_BIN"
              cat > "$TMP_BIN/sha256" <<'EOF'
#!/usr/bin/env bash
sha256sum "$1" | awk '{print $1}'
EOF
              chmod +x "$TMP_BIN/sha256"
              export PATH="$TMP_BIN:$PATH"
            fi
            for PKG_ARCH in $(find release_files -maxdepth 1 -type f -name "keen-pbr*_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_*.ipk" -printf '%f\n' | sed -E 's/^.*_openwrt_[^_]+_[^_]+_[^_]+_(.+)\.ipk$/\1/' | sort -u); do
              mapfile -t ARCH_IPKS < <(find release_files -maxdepth 1 -type f -name "keen-pbr*_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_${PKG_ARCH}.ipk" -printf '%f\n' | sort)
              if [ "${#ARCH_IPKS[@]}" -gt 0 ]; then
                TMP_DIR="release_files/ipk-index-${PKG_ARCH}"
                rm -rf "$TMP_DIR"
                mkdir -p "$TMP_DIR"
                for f in "${ARCH_IPKS[@]}"; do
                  cp "release_files/$f" "$TMP_DIR/"
                done
                (
                  cd "$TMP_DIR"
                  "$IPKG_INDEXER" . > Packages
                  gzip -n9c Packages > Packages.gz
                )
                cp "$TMP_DIR/Packages" "release_files/Packages_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_${PKG_ARCH}"
                cp "$TMP_DIR/Packages.gz" "release_files/Packages_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_${PKG_ARCH}.gz"
                rm -rf "$TMP_DIR"
              fi
            done
          else
            echo "No ipkg indexer found at $IPKG_INDEXER; skipping OpenWrt Packages index generation."
          fi

          APK_BIN="$SDK_DIR/staging_dir/host/bin/apk"
          if [ ! -x "$APK_BIN" ]; then
            echo "No OpenWrt host apk tool found at $APK_BIN; skipping .adb generation."
            APK_BIN=""
          fi
          if [ -n "$APK_BIN" ] && find release_files -maxdepth 1 -type f -name "keen-pbr*_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_*.apk" | grep -q .; then
            for PKG_ARCH in $(find release_files -maxdepth 1 -type f -name "keen-pbr*_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_*.apk" -printf '%f\n' | sed -E 's/^.*_openwrt_[^_]+_[^_]+_[^_]+_(.+)\.apk$/\1/' | sort -u); do
              mapfile -t ARCH_APKS < <(find release_files -maxdepth 1 -type f -name "keen-pbr*_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_${PKG_ARCH}.apk" -printf '%f\n' | sort)
              if [ "${#ARCH_APKS[@]}" -gt 0 ]; then
                (
                  cd release_files
                  "$APK_BIN" mkndx --allow-untrusted --output "packages_openwrt_${{ matrix.build_env.tag }}_${ARCH_PREFIX}_${PKG_ARCH}.adb" "${ARCH_APKS[@]}"
                )
              fi
            done
          else
            echo "No .apk artifacts found for this build; skipping .adb generation."
          fi
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-openwrt-${{ matrix.build_env.tag }}-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}
          path: |
            release_files/*.ipk
            release_files/*.apk
            release_files/Packages_openwrt_*
            release_files/Packages_openwrt_*.gz
            release_files/*.adb
