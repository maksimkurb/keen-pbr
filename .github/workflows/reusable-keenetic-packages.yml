name: Reusable Keenetic packages

on:
  workflow_call:
    inputs:
      build_scope:
        required: true
        type: string
      configs:
        required: false
        type: string
        default: ""
      frontend_artifact_name:
        required: false
        type: string
        default: "frontend-dist-gz"

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.gen.outputs.job-config }}
    steps:
      - name: Generate config matrix
        id: gen
        env:
          BUILD_SCOPE: ${{ inputs.build_scope }}
          CONFIGS_INPUT: ${{ inputs.configs }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          all_configs = [
              "aarch64-3.10.config",
              "mips-3.4.config",
              "mipsel-3.4.config",
              "x64-3.2.config",
              "armv7-3.2.config",
          ]

          build_scope = os.environ["BUILD_SCOPE"]
          raw = os.environ.get("CONFIGS_INPUT", "")
          if build_scope == "default":
              builds = ["mipsel-3.4.config"]
          else:
              selected = [item.strip() for item in raw.split(",") if item.strip()]
              builds = [cfg for cfg in all_configs if cfg in selected] if selected else all_configs

          matrix = []
          for config in builds:
              matrix.append(
                  {
                      "config_file": config,
                      "config_name": config.removesuffix(".config"),
                  }
              )

          print(f"job-config={json.dumps(matrix)}")
          PY

  build:
    name: "${{ matrix.build_env.config_name }}"
    runs-on: ubuntu-latest
    needs: [generate-config]
    strategy:
      fail-fast: false
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
    container:
      image: ghcr.io/maksimkurb/entware-builder:${{ matrix.build_env.config_name }}
      options: --user root
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.frontend_artifact_name }}
          path: frontend-dist-gz
      - name: Stage frontend dist
        run: |
          rm -rf "$GITHUB_WORKSPACE/frontend/dist"
          mkdir -p "$GITHUB_WORKSPACE/frontend/dist"
          cp -a "$GITHUB_WORKSPACE/frontend-dist-gz"/. "$GITHUB_WORKSPACE/frontend/dist/"
      - name: Build package
        working-directory: /home/me/Entware
        run: |
          printf '\nsrc-link keenPbr %s/packages/keenetic\n' "$GITHUB_WORKSPACE" >> feeds.conf
          ./scripts/feeds update keenPbr
          ./scripts/feeds install -p keenPbr keen-pbr
          FEED_PKG_DIR=$(find package -type d -path '*/keen-pbr' | grep '/package/feeds/' | head -1)
          cp "$GITHUB_WORKSPACE/version.mk" "$FEED_PKG_DIR/version.mk"
          cat "$GITHUB_WORKSPACE/packages/keenetic/packages.config" >> .config
          make defconfig
          make package/keen-pbr/compile V=s "-j$(nproc)" KEEN_PBR_SRC="$GITHUB_WORKSPACE"
      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          . "$GITHUB_WORKSPACE/version.mk"
          VERSION_RELEASE="${KEEN_PBR_VERSION}-${KEEN_PBR_RELEASE}"
          mkdir -p release_files
          find /home/me/Entware/bin -type f -path '*/packages/*.ipk' -name 'keen-pbr_*.ipk' | while read -r f; do
            cp "$f" "release_files/keen-pbr_${VERSION_RELEASE}_keenetic_${{ matrix.build_env.config_name }}.ipk"
          done
          find /home/me/Entware/bin -type f -path '*/packages/*.ipk' -name 'keen-pbr-headless_*.ipk' | while read -r f; do
            cp "$f" "release_files/keen-pbr-headless_${VERSION_RELEASE}_keenetic_${{ matrix.build_env.config_name }}.ipk"
          done

          # Build Keenetic ipk repository indexes in the build environment.
          TMP_DIR="release_files/index-${{ matrix.build_env.config_name }}"
          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"
          cp release_files/*_keenetic_${{ matrix.build_env.config_name }}.ipk "$TMP_DIR/"
          (
            cd "$TMP_DIR"
            python3 "$GITHUB_WORKSPACE/scripts/ipk-make-index.py" .
          )
          cp "$TMP_DIR/Packages" "release_files/Packages_keenetic_${{ matrix.build_env.config_name }}"
          cp "$TMP_DIR/Packages.gz" "release_files/Packages_keenetic_${{ matrix.build_env.config_name }}.gz"
          rm -rf "$TMP_DIR"
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-keenetic-${{ matrix.build_env.config_name }}
          path: |
            release_files/*.ipk
            release_files/Packages_keenetic_*
            release_files/Packages_keenetic_*.gz
