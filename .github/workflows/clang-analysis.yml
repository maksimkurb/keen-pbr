name: Clang analysis

on:
  push:
    branches:
      - 'main'
      - 'dev'
      - 'dev-*'
    paths:
      - '.clang-tidy'
      - '.github/workflows/**'
      - 'build_scripts/**'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'third_party/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'version.mk'
  pull_request:
  workflow_dispatch:

jobs:
  clang-analysis:
    name: clang-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clangd \
            cmake \
            pipx \
            python3-pip \
            pkg-config \
            libcurl4-openssl-dev \
            libnl-3-dev \
            libnl-route-3-dev \
            libunwind-dev
          export PATH="$HOME/.local/bin:$PATH"
          if pipx list 2>/dev/null | grep -Fq "package clangd-tidy "; then
            pipx upgrade --force clangd-tidy
          else
            pipx install clangd-tidy
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Fail on Clang compiler warnings
        shell: bash
        run: |
          set -euo pipefail
          make clang-check 2>&1 | tee /tmp/clang-check.log
          if grep -E ':[0-9]+:[0-9]+: warning:' /tmp/clang-check.log >/dev/null; then
            echo "Clang emitted warnings during make clang-check" >&2
            exit 1
          fi

      - name: Fail on clangd-tidy warnings
        run: |
          make clang-tidy CLANGD_TIDY_ARGS="--fail-on-severity=warn"
