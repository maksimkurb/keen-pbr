openapi: "3.1.0"
info:
  title: keen-pbr3 API
  description: REST API for the keen-pbr3 policy-based routing daemon.
  version: "3.0.0"

servers:
  - url: http://localhost:8080
    description: Default listen address (configurable)

paths:
  /api/health/service:
    get:
      summary: Service health and outbound status
      description: >
        Returns the running daemon version, service status, and health status
        for every configured outbound. For urltest outbounds, includes per-child
        probe results, latencies, circuit breaker states, and the currently
        selected outbound. Other outbound types are always reported as healthy.
      operationId: getHealthService
      responses:
        "200":
          description: Service health and outbound status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/reload:
    post:
      summary: Trigger reload
      description: >
        Triggers an asynchronous full reload: re-downloads all configured lists
        and re-applies firewall and routing rules.
      operationId: postReload
      responses:
        "200":
          description: Reload triggered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReloadResponse"

  /api/config:
    get:
      summary: Get config file
      description: >
        Returns the raw contents of the current configuration file as JSON.
      operationId: getConfig
      responses:
        "200":
          description: Current configuration file contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigObject"
        "500":
          description: Error reading config file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Update config file
      description: >
        Validates the provided JSON body as a config file, writes it atomically,
        then triggers a full reload.
      operationId: postConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigObject"
      responses:
        "200":
          description: Config updated and reload triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigUpdateResponse"
        "500":
          description: Validation or write error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/health/routing:
    get:
      summary: Routing and firewall health
      description: >
        Verifies the live kernel routing and firewall state against the expected
        configuration. Checks that the firewall chain exists, all rules are
        present, route tables are populated, and policy rules are in place.
      operationId: getHealthRouting
      responses:
        "200":
          description: Routing health report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingHealthResponse"
        "500":
          description: Unexpected error during health check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingHealthErrorResponse"

components:
  schemas:

    # -------------------------------------------------------------------------
    # /api/config — configuration object schema
    # -------------------------------------------------------------------------

    DaemonConfig:
      type: object
      properties:
        pid_file:
          type: string
          description: Path to the PID file.
          example: "/var/run/keen-pbr3.pid"
        cache_dir:
          type: string
          description: Directory for cached list data.
          default: "/var/cache/keen-pbr3"
          example: "/var/cache/keen-pbr3"

    ApiConfig:
      type: object
      properties:
        enabled:
          type: boolean
          default: false
          example: true
        listen:
          type: string
          description: Address and port for the HTTP API.
          default: "127.0.0.1:8080"
          example: "127.0.0.1:8080"

    RetryConfig:
      type: object
      properties:
        attempts:
          type: integer
          default: 3
          example: 3
        interval_ms:
          type: integer
          description: Delay between retry attempts in milliseconds.
          default: 1000
          example: 1000

    CircuitBreakerConfig:
      type: object
      properties:
        failure_threshold:
          type: integer
          description: Number of consecutive failures before opening the circuit.
          default: 5
          example: 5
        success_threshold:
          type: integer
          description: Number of consecutive successes in half-open state to close the circuit.
          default: 2
          example: 2
        timeout_ms:
          type: integer
          description: Time in milliseconds before the circuit transitions from open to half-open.
          default: 30000
          example: 30000
        half_open_max_requests:
          type: integer
          description: Maximum number of probe requests allowed in half-open state.
          default: 1
          example: 1

    OutboundGroup:
      type: object
      required: [outbounds]
      properties:
        weight:
          type: integer
          description: Relative weight for selecting this group when multiple groups are healthy.
          default: 1
          example: 1
        outbounds:
          type: array
          description: Ordered list of outbound tags to try within this group.
          items:
            type: string
          example: ["vpn"]

    Outbound:
      type: object
      required: [type, tag]
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
          enum: [interface, table, blackhole, ignore, urltest]
          description: Outbound type.
          example: "interface"
        tag:
          type: string
          description: Unique identifier for this outbound.
          example: "vpn"
        interface:
          type: string
          description: >
            Egress network interface name. Required for `interface` outbound type.
          example: "tun0"
        gateway:
          type: string
          description: >
            Optional gateway IP address. Used with `interface` outbound type.
          example: "10.8.0.1"
        table:
          type: integer
          description: >
            Kernel routing table ID. Required for `table` outbound type.
          example: 200
        url:
          type: string
          description: >
            Probe URL for latency measurements. Required for `urltest` outbound type.
          example: "https://www.gstatic.com/generate_204"
        interval_ms:
          type: integer
          description: >
            Interval between probes in milliseconds. Used with `urltest` outbound type.
          default: 180000
          example: 180000
        tolerance_ms:
          type: integer
          description: >
            Latency tolerance in milliseconds; outbounds within this range of the
            best are considered equivalent. Used with `urltest` outbound type.
          default: 100
          example: 100
        outbound_groups:
          type: array
          description: >
            Ordered list of outbound groups. Required for `urltest` outbound type.
            Groups are tried in order; within a group the outbound is selected by weight.
          items:
            $ref: "#/components/schemas/OutboundGroup"
        retry:
          $ref: "#/components/schemas/RetryConfig"
        circuit_breaker:
          $ref: "#/components/schemas/CircuitBreakerConfig"

    ListConfig:
      type: object
      description: >
        Defines a named list of domains and/or IP CIDRs used in routing and DNS rules.
        At least one of `url`, `domains`, `ip_cidrs`, or `file` must be provided.
      properties:
        url:
          type: string
          description: URL to a remote list file to download and cache.
          example: "https://raw.githubusercontent.com/v2fly/domain-list-community/refs/heads/master/data/instagram"
        domains:
          type: array
          description: Inline list of domain patterns (supports `*.` wildcards).
          items:
            type: string
          example: ["example.com", "*.example.org"]
        ip_cidrs:
          type: array
          description: Inline list of IP addresses or CIDR ranges.
          items:
            type: string
          example: ["93.184.216.34", "10.0.0.0/8"]
        file:
          type: string
          description: Path to a local list file.
          example: "./my-list.txt"
        ttl_ms:
          type: integer
          description: >
            TTL for dnsmasq-resolved ipset entries in milliseconds.
            `0` means no timeout.
          default: 0
          example: 86400000

    DnsServer:
      type: object
      required: [tag, address]
      properties:
        tag:
          type: string
          description: Unique identifier for this DNS server.
          example: "vpn-dns"
        address:
          type: string
          description: IPv4 or IPv6 address of the DNS server.
          example: "10.8.0.1"
        detour:
          type: string
          description: Outbound tag to use when querying this DNS server.
          example: "vpn"

    DnsRule:
      type: object
      required: [list, server]
      properties:
        list:
          type: array
          description: List names whose domains should be resolved by this server.
          items:
            type: string
          example: ["my-domains", "remote-list"]
        server:
          type: string
          description: DNS server tag to use for matched domains.
          example: "vpn-dns"

    DnsConfig:
      type: object
      properties:
        servers:
          type: array
          items:
            $ref: "#/components/schemas/DnsServer"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/DnsRule"
        fallback:
          type: string
          description: DNS server tag to use when no rule matches.
          example: "google-dns"

    RouteRule:
      type: object
      required: [list, outbound]
      properties:
        list:
          type: array
          description: List names whose traffic this rule matches.
          items:
            type: string
          example: ["my-domains", "my-ips"]
        outbound:
          type: string
          description: Outbound tag to route matched traffic through.
          example: "vpn"
        proto:
          type: string
          description: Protocol to match ("tcp", "udp", or "tcp/udp"). Omit for any.
          example: "tcp"
        src_port:
          type: string
          description: Source port spec ("443", "80,443", "8000-9000"). Omit for any.
          example: "1024-65535"
        dest_port:
          type: string
          description: Destination port spec ("443", "80,443", "8000-9000"). Omit for any.
          example: "443"

    RouteConfig:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/RouteRule"
        fallback:
          type: string
          description: Outbound tag for traffic that matches no rule.
          example: "wan"

    FwmarkConfig:
      type: object
      properties:
        start:
          type: integer
          description: First fwmark value to assign to outbounds.
          default: 65536
          example: 65536
        mask:
          type: integer
          description: >
            Fwmark bitmask. Must be exactly two adjacent hex nibbles (e.g. 0x00FF0000).
          default: 16711680
          example: 16711680

    IprouteConfig:
      type: object
      properties:
        table_start:
          type: integer
          description: First routing table ID to allocate for outbounds.
          default: 150
          example: 150

    ListsAutoupdateConfig:
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether automatic list refresh is enabled.
          default: false
          example: true
        cron:
          type: string
          description: >
            Standard 5-field cron expression controlling when lists are refreshed.
            Required when `enabled` is `true`. Validated even when `enabled` is `false`.
          example: "0 4 * * *"

    ConfigObject:
      type: object
      description: keen-pbr3 configuration file.
      properties:
        daemon:
          $ref: "#/components/schemas/DaemonConfig"
        api:
          $ref: "#/components/schemas/ApiConfig"
        outbounds:
          type: array
          items:
            $ref: "#/components/schemas/Outbound"
        lists:
          type: object
          description: Named list definitions keyed by list name.
          additionalProperties:
            $ref: "#/components/schemas/ListConfig"
        dns:
          $ref: "#/components/schemas/DnsConfig"
        route:
          $ref: "#/components/schemas/RouteConfig"
        fwmark:
          $ref: "#/components/schemas/FwmarkConfig"
        iproute:
          $ref: "#/components/schemas/IprouteConfig"
        lists_autoupdate:
          $ref: "#/components/schemas/ListsAutoupdateConfig"
      example:
        daemon:
          pid_file: "/var/run/keen-pbr3.pid"
          cache_dir: "/var/cache/keen-pbr3"
        api:
          enabled: true
          listen: "127.0.0.1:8080"
        outbounds:
          - type: "interface"
            tag: "vpn"
            interface: "tun0"
            gateway: "10.8.0.1"
          - type: "interface"
            tag: "wan"
            interface: "eth0"
            gateway: "192.168.1.1"
          - type: "table"
            tag: "custom-table"
            table: 200
          - type: "blackhole"
            tag: "block"
          - type: "ignore"
            tag: "direct"
          - type: "urltest"
            tag: "auto-select"
            url: "https://www.gstatic.com/generate_204"
            interval_ms: 180000
            tolerance_ms: 100
            outbound_groups:
              - weight: 1
                outbounds: ["vpn"]
              - weight: 2
                outbounds: ["wan"]
            retry:
              attempts: 3
              interval_ms: 1000
            circuit_breaker:
              failure_threshold: 5
              success_threshold: 2
              timeout_ms: 30000
              half_open_max_requests: 1
        lists:
          my-domains:
            domains:
              - "example.com"
              - "*.example.org"
          my-ips:
            ip_cidrs:
              - "93.184.216.34"
              - "10.0.0.0/8"
          remote-list:
            url: "https://raw.githubusercontent.com/v2fly/domain-list-community/refs/heads/master/data/instagram"
          local-list:
            file: "./my-list.txt"
        dns:
          servers:
            - tag: "vpn-dns"
              address: "10.8.0.1"
            - tag: "google-dns"
              address: "8.8.8.8"
          rules:
            - list: ["my-domains", "remote-list"]
              server: "vpn-dns"
          fallback: "google-dns"
        fwmark:
          start: 65536
          mask: 16711680
        iproute:
          table_start: 150
        lists_autoupdate:
          enabled: true
          cron: "0 4 * * *"
        route:
          rules:
            - list: ["my-domains", "my-ips", "remote-list"]
              outbound: "vpn"
            - list: ["local-list"]
              outbound: "auto-select"
          fallback: "wan"

    # -------------------------------------------------------------------------
    # Internal: cache metadata (not exposed via API paths)
    # -------------------------------------------------------------------------

    CacheMetadata:
      type: object
      properties:
        etag:
          type: string
        last_modified:
          type: string
        url:
          type: string
        download_time:
          type: string
        ips:
          type: integer
        cidrs:
          type: integer
        domains:
          type: integer

    # -------------------------------------------------------------------------
    # /api/health/service
    # -------------------------------------------------------------------------

    HealthChild:
      type: object
      required: [tag, success, latency_ms]
      properties:
        tag:
          type: string
          description: Child outbound tag.
          example: "vpn0"
        success:
          type: boolean
          description: Whether the last probe succeeded.
          example: true
        latency_ms:
          type: integer
          description: Round-trip latency of the last probe in milliseconds.
          example: 42
        error:
          type: string
          description: Error message from the last failed probe. Omitted on success.
          example: "connection refused"
        circuit_breaker:
          type: string
          enum: [closed, open, half_open]
          description: >
            Current circuit breaker state for this child.
            - closed: healthy, traffic passes through
            - open: failed, traffic blocked during cooldown
            - half_open: testing recovery with limited probes
          example: "closed"

    HealthEntry:
      type: object
      required: [tag, type, status]
      properties:
        tag:
          type: string
          description: Outbound tag.
          example: "auto-select"
        type:
          type: string
          enum: [interface, table, blackhole, ignore, urltest]
          example: "urltest"
        status:
          type: string
          enum: [healthy, degraded, unknown]
          description: >
            - healthy: outbound is functioning (for urltest: a child is selected)
            - degraded: urltest has no selected outbound
            - unknown: urltest state not yet initialized
          example: "healthy"
        selected_outbound:
          type: string
          description: >
            Currently selected child outbound tag. Present only for urltest
            outbounds.
          example: "vpn0"
        children:
          type: array
          description: >
            Per-child probe results. Present only for urltest outbounds.
          items:
            $ref: "#/components/schemas/HealthChild"

    HealthResponse:
      type: object
      required: [version, status, outbounds]
      properties:
        version:
          type: string
          description: Daemon version string.
          example: "3.0.0"
        status:
          type: string
          enum: [running]
          example: "running"
        resolver_config_hash:
          type: string
          description: >
            MD5 hex digest of the current domain-to-ipset mapping.
            Matches the txt-record written by generate-resolver-config; use to
            verify the dnsmasq config is up to date.
          example: "a3f7c1d9e2b84560abcdef1234567890"
        outbounds:
          type: array
          items:
            $ref: "#/components/schemas/HealthEntry"

    # -------------------------------------------------------------------------
    # /api/reload
    # -------------------------------------------------------------------------

    ReloadResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [ok]
          example: "ok"
        message:
          type: string
          example: "Reload triggered"

    # -------------------------------------------------------------------------
    # /api/config
    # -------------------------------------------------------------------------

    ConfigUpdateResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [ok]
          example: "ok"
        message:
          type: string
          example: "Config updated and reload triggered"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error message.
          example: "Cannot open config file"

    # -------------------------------------------------------------------------
    # /api/health/routing
    # -------------------------------------------------------------------------

    CheckStatus:
      type: string
      enum: [ok, missing, mismatch]
      description: >
        Result of an individual routing/firewall check.
        - ok: check passed
        - missing: expected element not found
        - mismatch: element found but configuration differs

    FirewallChain:
      type: object
      required: [chain_present, prerouting_hook_present]
      properties:
        chain_present:
          type: boolean
          description: Whether the keen-pbr3 firewall chain exists.
          example: true
        prerouting_hook_present:
          type: boolean
          description: Whether the chain is hooked into PREROUTING.
          example: true
        detail:
          type: string
          description: Human-readable detail. Omitted when empty.
          example: "chain keen-pbr3 found in table mangle"

    FirewallRuleCheck:
      type: object
      required: [set_name, action, status]
      properties:
        set_name:
          type: string
          description: IP set or nftables set name for this rule.
          example: "keen-pbr3-russia"
        action:
          type: string
          description: Expected firewall action (e.g. "MARK", "DROP").
          example: "MARK"
        expected_fwmark:
          type: string
          description: Expected fwmark value as hex string. Present when applicable.
          example: "0x00010000"
        actual_fwmark:
          type: string
          description: Actual fwmark found in the kernel rule. Present when rule exists.
          example: "0x00010000"
        status:
          $ref: "#/components/schemas/CheckStatus"
        detail:
          type: string
          description: Human-readable detail. Omitted when empty.

    RouteTableCheck:
      type: object
      required: [table_id, outbound_tag, table_exists, default_route_present, interface_matches, gateway_matches, status]
      properties:
        table_id:
          type: integer
          description: Routing table ID.
          example: 100
        outbound_tag:
          type: string
          description: Outbound tag associated with this table.
          example: "vpn0"
        expected_interface:
          type: string
          description: Expected egress interface. Present when configured.
          example: "tun0"
        expected_gateway:
          type: string
          description: Expected gateway IP. Present when configured.
          example: "10.8.0.1"
        table_exists:
          type: boolean
          description: Whether the routing table exists in the kernel.
          example: true
        default_route_present:
          type: boolean
          description: Whether a default route (0.0.0.0/0 or ::/0) is present in the table.
          example: true
        interface_matches:
          type: boolean
          description: Whether the actual egress interface matches the expected one.
          example: true
        gateway_matches:
          type: boolean
          description: Whether the actual gateway matches the expected one.
          example: true
        status:
          $ref: "#/components/schemas/CheckStatus"
        detail:
          type: string
          description: Human-readable detail. Omitted when empty.

    PolicyRuleCheck:
      type: object
      required: [fwmark, fwmask, expected_table, priority, rule_present_v4, rule_present_v6, status]
      properties:
        fwmark:
          type: string
          description: Firewall mark as hex string.
          example: "0x00010000"
        fwmask:
          type: string
          description: Firewall mask as hex string.
          example: "0x00ff0000"
        expected_table:
          type: integer
          description: Expected routing table ID for this policy rule.
          example: 100
        priority:
          type: integer
          description: Policy rule priority.
          example: 1000
        rule_present_v4:
          type: boolean
          description: Whether the IPv4 policy rule is present.
          example: true
        rule_present_v6:
          type: boolean
          description: Whether the IPv6 policy rule is present.
          example: true
        status:
          $ref: "#/components/schemas/CheckStatus"
        detail:
          type: string
          description: Human-readable detail. Omitted when empty.

    RoutingHealthResponse:
      type: object
      required: [overall, firewall_backend, firewall, firewall_rules, route_tables, policy_rules]
      properties:
        overall:
          type: string
          enum: [ok, degraded, error]
          description: >
            - ok: all checks passed
            - degraded: one or more checks failed
            - error: an exception prevented checks from completing
          example: "ok"
        firewall_backend:
          type: string
          enum: [iptables, nftables]
          description: Active firewall backend.
          example: "nftables"
        firewall:
          $ref: "#/components/schemas/FirewallChain"
        firewall_rules:
          type: array
          items:
            $ref: "#/components/schemas/FirewallRuleCheck"
        route_tables:
          type: array
          items:
            $ref: "#/components/schemas/RouteTableCheck"
        policy_rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRuleCheck"

    RoutingHealthErrorResponse:
      type: object
      required: [overall, error]
      properties:
        overall:
          type: string
          enum: [error]
          example: "error"
        error:
          type: string
          description: Exception message.
          example: "failed to connect to netlink socket"
