baseURL: https://keen-pbr.fyi/
defaultContentLanguage: en
defaultContentLanguageInSubtitle: ""
languageCode: en-us
title: keen-pbr

languages:
  en:
    languageName: English
    weight: 1
  ru:
    languageName: Русский
    weight: 2

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

enableInlineShortcodes: true

params:
  search:
    enable: true
    type: flexsearch
  footer:
    displayCopyright: false
    displayPoweredBy: false
  navbar:
    logo:
      path: logo.svg
      link: /
      width: 32
      height: 32
    width: wide
  page:
    width: wide
    tabs:
      sync: true
    contextMenu:
      enable: true
      links:
        - name: Open in ChatGPT
          icon: chatgpt
          url: "https://chatgpt.com/?hints=search&q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."

outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]

menu:
  main:
    - name: Docs
      identifier: docs
      pageRef: /docs
      weight: 10
    
    - name: Search
      weight: 20
      params:
        type: search
    
    - name: GitHub
      url: https://github.com/maksimkurb/keen-pbr
      weight: 30
      params:
        icon: github
    
    - name: Telegram
      url: https://t.me/keen_pbr
      weight: 40
      params:
        icon: telegram
    
    - name: Support this project
      identifier: donate
      pageRef: /docs/support-this-project
      weight: 50
      params:
        icon: donate
